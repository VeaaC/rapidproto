# Continuous integration: the project's quality bar on every push to the default branch and every
# pull request. Parallel jobs -- the default gate's build/test stages, its clang-tidy stage as a
# three-shard matrix (tidy is ~80% of the gate's CPU, so it gets its own runners), the heavy
# "deep" tier (sanitizers + coverage floor + fuzz smoke), a Release -O3 -Werror build on both
# compilers, and the consumer job (install -> find_package -> newer-standard header compiles) --
# so wall-clock is the slowest runner, not the sum.
name: CI

on:
  push:
    branches: [master, main]  # feature-branch pushes are gated by their PR run, not double-run
  pull_request:

# A newer push to the same ref cancels an in-progress run, so only the latest commit is gated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate (format + dual-compiler build/test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
      - name: Quality gate minus tidy (./check.sh)
        run: RAPIDPROTO_GATE_STAGES='format gcc clang cf fuzz' ./check.sh

  tidy:
    name: tidy (shard ${{ matrix.shard }} of 3)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
      - name: clang-tidy shard
        run: >
          RAPIDPROTO_GATE_STAGES='tidy'
          RAPIDPROTO_TIDY_SHARD='${{ matrix.shard }}/3'
          ./check.sh

  deep:
    name: deep (ASan/UBSan + coverage + fuzz smoke)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
      - name: Heavy tier (./check.sh deep)
        run: ./check.sh deep
      - name: Upload fuzz crash reproducers + logs
        if: failure()  # a CI-only fuzz crash is unreproducible without its input
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: build/fuzz/
          if-no-files-found: ignore

  release:
    name: release (-O3 -Werror, gcc-13 + clang-20)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
      - name: Build + test Release on both compilers
        run: |
          set -euxo pipefail
          for cxx in g++-13 clang++-20; do
            dir="build/release-${cxx}"
            cmake -S . -B "$dir" -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER="$cxx"
            cmake --build "$dir" -j"$(nproc)"
            "$dir/rapidproto_tests"
          done

  # The shipped surface: a tests-OFF build, `cmake --install`, and a consumer built purely from the
  # installed prefix via find_package -- so the Config file, the imported tool, and the installed
  # helper can't regress silently. Then the generated headers are compiled under C++20 and C++23:
  # header-only consumers meet newer standards first, on their compiler, not ours (system gcc here,
  # deliberately unpinned).
  consumer:
    name: consumer (install + find_package + C++20/23 headers)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build + install rapidproto (tests OFF, system compiler)
        run: |
          set -euxo pipefail
          cmake -S . -B build/install -DCMAKE_BUILD_TYPE=Release -DRAPIDPROTO_BUILD_TESTS=OFF
          cmake --build build/install -j"$(nproc)"
          cmake --install build/install --prefix "$PWD/prefix"
      - name: Build the consumer example against the installed prefix (find_package)
        run: |
          set -euxo pipefail
          cmake -S examples/consumer -B build/consumer -DCMAKE_PREFIX_PATH="$PWD/prefix"
          cmake --build build/consumer -j"$(nproc)"
          ctest --test-dir build/consumer --output-on-failure
      - name: Compile the generated headers under C++20 and C++23
        run: |
          set -euxo pipefail
          "$PWD/prefix/bin/rapidprotoc" --arena --stream -Iexamples/consumer/proto \
            --out-dir build/gen examples/consumer/proto/message.proto
          for std in c++20 c++23; do
            g++ -std="$std" -Wall -Wextra -Werror -Ibuild/gen -c examples/consumer/main.cpp -o /dev/null
          done
