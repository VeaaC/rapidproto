// A dependency: a message with an extension range (extended cross-file by main.proto) and
// an enum, both referenced across files.
syntax = "proto2";

package dep;

message Dep {
  optional int32 v = 1;
  // dep uses its OWN enum, and main.proto references the same DepEnum cross-file. So both dep's and
  // main's dumpers touch DepEnum -- a regression guard for the debug dumper emitting rp_dump_enum_name
  // once (at the enum's definition site, here in dep) and never re-emitting it in main's header (which
  // #includes dep's) where it would redefine the inline function.
  optional DepEnum de = 2;
  extensions 100 to max;
}

enum DepEnum {
  DEP_ZERO = 0;
  DEP_ONE = 1;
}
