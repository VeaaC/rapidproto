// Fixture for arenagen parse emission: >64 required fields, so the transient required-presence bitmask
// (rp_req) must be a multi-word uint64[] -- a single uint64 would shift by >=64 (UB) on field 65+.
syntax = "proto2";

package mr;

message ManyRequired {
  required int32 f1 = 1;
  required int32 f2 = 2;
  required int32 f3 = 3;
  required int32 f4 = 4;
  required int32 f5 = 5;
  required int32 f6 = 6;
  required int32 f7 = 7;
  required int32 f8 = 8;
  required int32 f9 = 9;
  required int32 f10 = 10;
  required int32 f11 = 11;
  required int32 f12 = 12;
  required int32 f13 = 13;
  required int32 f14 = 14;
  required int32 f15 = 15;
  required int32 f16 = 16;
  required int32 f17 = 17;
  required int32 f18 = 18;
  required int32 f19 = 19;
  required int32 f20 = 20;
  required int32 f21 = 21;
  required int32 f22 = 22;
  required int32 f23 = 23;
  required int32 f24 = 24;
  required int32 f25 = 25;
  required int32 f26 = 26;
  required int32 f27 = 27;
  required int32 f28 = 28;
  required int32 f29 = 29;
